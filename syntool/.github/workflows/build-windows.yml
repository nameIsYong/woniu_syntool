name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package release files
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $zipName = "syn_tool-windows-release.zip"
          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $zipName -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syn_tool-windows-release
          path: syn_tool-windows-release.zip

      - name: Attach asset to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: syn_tool-windows-release.zip
